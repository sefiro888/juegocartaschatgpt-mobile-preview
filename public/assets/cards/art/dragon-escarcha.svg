<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#060a16" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-dragon-escarcha)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Draconic head/neck silhouette with ice horns -->
      <path d="M 120,330 Q 150,220 200,160 Q 240,120 280,110" fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" />
      <path d="M 280,110 L 295,95 L 275,100 Z" fill="#00e5ff" stroke="#fff" stroke-width="1" />
      <!-- Ice crest -->
      <polygon points="200,140 215,120 205,150" fill="#e0f2fe" />
      <polygon points="170,180 185,160 175,190" fill="#e0f2fe" />
      <!-- Frost breathe particle storm -->
      <circle cx="310" cy="100" r="10" fill="#00e5ff" filter="blur(5px)" opacity="0.8" />
      <circle cx="340" cy="90" r="15" fill="#e0f2fe" filter="blur(8px)" opacity="0.6" />
    

  <defs>
    <radialGradient id="bgGrad-dragon-escarcha" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#060a16" />
    </radialGradient>
  </defs>
</svg>
