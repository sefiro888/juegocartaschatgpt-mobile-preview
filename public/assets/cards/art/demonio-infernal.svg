<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#160808" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-demonio-infernal)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Bat wings -->
      <path d="M 200,180 L 100,120 L 70,220 L 120,200 L 150,240 Z" fill="#2d0c0c" stroke="#ef4444" stroke-width="1.5" />
      <path d="M 200,180 L 300,120 L 330,220 L 280,200 L 250,240 Z" fill="#2d0c0c" stroke="#ef4444" stroke-width="1.5" />
      <!-- Body & Horns -->
      <path d="M 160,180 L 240,180 L 220,280 L 180,280 Z" fill="#140202" stroke="#ef4444" stroke-width="2.5" />
      <circle cx="200" cy="150" r="25" fill="#2d0c0c" stroke="#ef4444" stroke-width="2" />
      <!-- Horns -->
      <path d="M 185,130 Q 160,90 145,110 Q 170,120 180,135 Z" fill="#ef4444" />
      <path d="M 215,130 Q 240,90 255,110 Q 230,120 220,135 Z" fill="#ef4444" />
      <!-- Flame aura -->
      <path d="M 175,155 Q 200,135 225,155" fill="none" stroke="#f59e0b" stroke-width="3" />
    

  <defs>
    <radialGradient id="bgGrad-demonio-infernal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#160808" />
    </radialGradient>
  </defs>
</svg>
