<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#160808" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-quimera-caos)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Chaotic light behind -->
      <circle cx="200" cy="200" r="120" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="10 15" />
      <!-- Main body silhouette -->
      <path d="M 130,220 L 270,220 L 250,320 L 150,320 Z" fill="#1a0c0c" stroke="#f59e0b" stroke-width="2" />
      <!-- Three heads placeholders -->
      <!-- Left head: Goat -->
      <circle cx="160" cy="160" r="16" fill="#2d1919" stroke="#ef4444" stroke-width="1.5" />
      <path d="M 145,150 Q 130,130 145,135 Z" fill="#ef4444" />
      <!-- Center head: Lion -->
      <circle cx="200" cy="150" r="20" fill="#471b1b" stroke="#f59e0b" stroke-width="2" />
      <circle cx="200" cy="150" r="26" fill="none" stroke="#fef08a" stroke-width="1.5" stroke-dasharray="4 2" />
      <!-- Right head: Snake -->
      <circle cx="240" cy="160" r="14" fill="#192d1a" stroke="#10b981" stroke-width="1.5" />
      <path d="M 245,160 L 265,155" stroke="#10b981" stroke-width="2" />
    

  <defs>
    <radialGradient id="bgGrad-quimera-caos" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#160808" />
    </radialGradient>
  </defs>
</svg>
