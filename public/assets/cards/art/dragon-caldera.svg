<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Red glowing volcanic sky -->
  <rect width="400" height="400" fill="#180404" />
  <circle cx="200" cy="300" r="220" fill="url(#magma-glow)" opacity="0.4" />

  <!-- Volcano walls around the caldera -->
  <path d="M 0,180 L 80,240 L 50,400 L 0,400 Z" fill="#080202" />
  <path d="M 400,180 L 320,240 L 350,400 L 400,400 Z" fill="#080202" />

  <!-- Giant lava lake -->
  <ellipse cx="200" cy="380" rx="160" ry="40" fill="#ff2a00" filter="blur(6px)" />
  <ellipse cx="200" cy="378" rx="110" ry="25" fill="#ff9900" filter="blur(2px)" />

  <!-- Dragon Head Silhouette rising from below -->
  <g transform="translate(100, 110)">
    <!-- Neck -->
    <path d="M 60,180 L 140,180 L 130,110 L 70,110 Z" fill="#1e0807" stroke="#ff3c00" stroke-width="2" />
    
    <!-- Dragon Head -->
    <path d="M 50,110 L 150,110 L 170,140 Q 185,150 160,165 Q 110,165 90,150 L 55,145 Z" fill="#150504" stroke="#ff3c00" stroke-width="3" />
    
    <!-- Horns -->
    <path d="M 70,110 L 40,60 L 60,95 Z" fill="#ff3c00" />
    <path d="M 85,110 L 50,40 L 75,90 Z" fill="#ff8800" />
    <path d="M 130,110 L 160,60 L 140,95 Z" fill="#ff3c00" />
    <path d="M 115,110 L 150,40 L 125,90 Z" fill="#ff8800" />

    <!-- Glowing Eye -->
    <polygon points="110,120 125,123 115,129" fill="#ffea00" />
    
    <!-- Lava throat glow -->
    <path d="M 90,150 Q 115,158 135,152 Z" fill="#ffaa00" filter="blur(1px)" />
  </g>

  <!-- Massive Fire Breath shooting upwards -->
  <path d="M 220,260 Q 240,120 160,30 Q 300,90 240,265 Z" fill="url(#fire-breath-grad)" filter="blur(3px)" />
  <path d="M 215,255 Q 230,140 180,60 Q 270,110 230,260 Z" fill="#ffea00" opacity="0.9" />

  <defs>
    <radialGradient id="magma-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3300" />
      <stop offset="60%" stop-color="#7a1408" />
      <stop offset="100%" stop-color="#180404" />
    </radialGradient>
    <linearGradient id="fire-breath-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff3c00" />
      <stop offset="50%" stop-color="#ffaa00" />
      <stop offset="100%" stop-color="#ffffcc" />
    </linearGradient>
  </defs>
</svg>
