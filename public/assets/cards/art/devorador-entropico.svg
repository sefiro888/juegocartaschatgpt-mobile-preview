<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0b0514" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-devorador-entropico)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Enormous gaping jaw profile -->
      <path d="M 100,100 Q 240,130 180,200 L 260,250 Q 160,290 100,320 Z" fill="#080112" stroke="#ec4899" stroke-width="3.5" />
      <!-- Sharp teeth spikes inside -->
      <polygon points="120,115 130,140 140,118 M 160,120 170,148 180,122" fill="#fae8ff" />
      <polygon points="120,305 130,280 140,302 M 160,300 170,272 180,298" fill="#fae8ff" />
      <!-- Devouring vortex background -->
      <circle cx="200" cy="200" r="80" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6 8" />
    

  <defs>
    <radialGradient id="bgGrad-devorador-entropico" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#0b0514" />
    </radialGradient>
  </defs>
</svg>
