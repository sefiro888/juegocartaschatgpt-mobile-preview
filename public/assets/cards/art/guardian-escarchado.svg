<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#060a16" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-guardian-escarchado)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Big crystalline shield -->
      <polygon points="120,100 280,100 300,240 200,320 100,240" fill="#0c2540" stroke="#00e5ff" stroke-width="4" />
      <polygon points="140,115 260,115 275,230 200,295 125,230" fill="none" stroke="#e0f2fe" stroke-width="1.5" stroke-dasharray="6,6" />
      <!-- Ice core of the shield -->
      <circle cx="200" cy="200" r="30" fill="#00d9ff" opacity="0.7" filter="blur(8px)" />
      <polygon points="185,185 215,185 200,215" fill="#ffffff" />
      <!-- Blizzard particles -->
      <circle cx="110" cy="150" r="3" fill="#fff" opacity="0.6"/>
      <circle cx="290" cy="180" r="4" fill="#fff" opacity="0.8"/>
      <circle cx="160" cy="290" r="2.5" fill="#fff" opacity="0.7"/>
    

  <defs>
    <radialGradient id="bgGrad-guardian-escarchado" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#060a16" />
    </radialGradient>
  </defs>
</svg>
