<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#030814" />
  <circle cx="200" cy="200" r="160" fill="url(#congel-gr)" opacity="0.3" />

  <!-- A large detailed snowflake -->
  <g transform="translate(100, 100)">
    <!-- Six axis spikes -->
    <line x1="100" y1="20" x2="100" y2="180" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <line x1="20" y1="100" x2="180" y2="100" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <line x1="43" y1="43" x2="157" y2="157" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="43" y1="157" x2="157" y2="43" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />

    <!-- Ornaments on main spikes -->
    <path d="M 100,60 L 90,50 M 100,60 L 110,50" stroke="#00e5ff" stroke-width="3" />
    <path d="M 100,140 L 90,150 M 100,140 L 110,150" stroke="#00e5ff" stroke-width="3" />
    <path d="M 60,100 L 50,90 M 60,100 L 50,110" stroke="#00e5ff" stroke-width="3" />
    <path d="M 140,100 L 150,90 M 140,100 L 150,110" stroke="#00e5ff" stroke-width="3" />
  </g>

  <defs>
    <radialGradient id="congel-gr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d9ff" />
      <stop offset="100%" stop-color="#030814" />
    </radialGradient>
  </defs>
</svg>
