<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Charred sky background -->
  <rect width="400" height="400" fill="#1b0a0a" />
  
  <!-- Running horse flame trail -->
  <path d="M 50,220 C 120,180 220,160 350,150" stroke="#ff3c00" stroke-width="25" stroke-linecap="round" fill="none" opacity="0.3" filter="blur(8px)" />
  <path d="M 80,210 C 140,185 220,170 320,160" stroke="#ff7700" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.6" filter="blur(3px)" />
  <path d="M 120,200 C 170,185 220,175 290,170" stroke="#ffea00" stroke-width="5" stroke-linecap="round" fill="none" />

  <!-- Ghost horse silhouette (simplified running pose) -->
  <g transform="translate(140, 120)">
    <!-- Body -->
    <path d="M 20,60 Q 50,40 80,60 L 90,80 L 10,80 Z" fill="#ff4c00" stroke="#ffcc00" stroke-width="2" />
    <!-- Neck & Head -->
    <path d="M 70,60 Q 90,30 110,20 L 120,30 Q 100,50 85,75 Z" fill="#ff4c00" stroke="#ffcc00" stroke-width="2" />
    <!-- Mane of fire -->
    <polygon points="75,45 60,20 85,35" fill="#ffea00" />
    <polygon points="90,30 80,5 100,20" fill="#ffea00" />
  </g>
</svg>
