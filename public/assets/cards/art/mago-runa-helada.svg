<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#040a12" />
  
  <!-- Wizard body silhouette -->
  <g transform="translate(120, 80)">
    <!-- Robes -->
    <path d="M 30,130 L 110,130 L 125,230 L 15,230 Z" fill="#081e33" stroke="#00e5ff" stroke-width="1.5" />
    
    <!-- Staff with ice crystal at peak -->
    <line x1="120" y1="230" x2="120" y2="40" stroke="#00d9ff" stroke-width="4" />
    <polygon points="120,40 110,10 130,10" fill="#ffffff" stroke="#00e5ff" stroke-width="1.5" />
    
    <!-- Hood/Head -->
    <path d="M 45,100 C 45,60 95,60 95,100 L 85,115 L 55,115 Z" fill="#040b14" stroke="#00e5ff" stroke-width="2" />
    <circle cx="62" cy="85" r="3" fill="#00e5ff" />
    <circle cx="78" cy="85" r="3" fill="#00e5ff" />
  </g>
</svg>
