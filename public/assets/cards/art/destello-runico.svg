<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Cosmos dark landscape -->
  <rect width="400" height="400" fill="#030712" />
  
  <!-- Glowing neon runic wheel in center -->
  <g transform="translate(100, 100)">
    <!-- Glow -->
    <circle cx="100" cy="100" r="90" fill="none" stroke="#00e5ff" stroke-width="4" filter="blur(1px)" />
    <circle cx="100" cy="100" r="70" fill="none" stroke="#e0f7fa" stroke-width="1.5" stroke-dasharray="10 12" />

    <!-- Central runic star -->
    <polygon points="100,30 115,85 170,100 115,115 100,170 85,115 30,100 85,85" fill="#ffffff" />
    <polygon points="100,45 110,90 155,100 110,110 100,155 90,110 45,100 90,90" fill="#00e5ff" opacity="0.8" />
  </g>

  <!-- Ice sparks flying outwards -->
  <circle cx="80" cy="90" r="3" fill="#00e5ff" />
  <circle cx="310" cy="120" r="2.5" fill="#fff" />
  <circle cx="120" cy="320" r="3" fill="#00e5ff" />
  <circle cx="280" cy="290" r="1.5" fill="#fff" />
</svg>
