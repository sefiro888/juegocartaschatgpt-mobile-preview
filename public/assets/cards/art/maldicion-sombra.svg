<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-maldicion-sombra)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Glowing skull icon enveloped in dark smoke -->
      <circle cx="200" cy="160" r="70" fill="#a855f7" opacity="0.2" filter="blur(15px)" />
      <g transform="translate(160, 110)">
        <rect x="15" y="5" width="50" height="40" rx="15" fill="#1c072c" stroke="#d946ef" stroke-width="3" />
        <rect x="25" y="35" width="30" height="20" rx="4" fill="#1c072c" stroke="#d946ef" stroke-width="3" />
        <!-- Hollow eyes -->
        <circle cx="30" cy="22" r="5" fill="#000" />
        <circle cx="50" cy="22" r="5" fill="#000" />
      </g>
      <!-- Smoke trails -->
      <path d="M 130,220 Q 200,160 270,220" fill="none" stroke="#a855f7" stroke-width="3" stroke-dasharray="10 10" />
      <path d="M 150,240 Q 200,200 250,240" fill="none" stroke="#d946ef" stroke-width="2" />
    

  <defs>
    <radialGradient id="bgGrad-maldicion-sombra" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
    </radialGradient>
  </defs>
</svg>
