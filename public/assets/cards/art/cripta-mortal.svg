<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-cripta-mortal)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Stone tomb vault silhouette -->
      <polygon points="120,280 280,280 260,160 140,160" fill="#1f142c" stroke="#a855f7" stroke-width="2.5" />
      <!-- Arch entrance -->
      <path d="M 160,280 V 200 C 160,170 240,170 240,200 V 280 Z" fill="#000000" stroke="#d946ef" stroke-width="2" />
      <!-- Glowing gravestones flanking -->
      <path d="M 70,280 V 220 L 95,220 V 280 Z" fill="#0a050f" stroke="#a855f7" stroke-width="1.5" />
      <path d="M 305,280 V 220 L 330,220 V 280 Z" fill="#0a050f" stroke="#a855f7" stroke-width="1.5" />
      <!-- Ghost mist -->
      <ellipse cx="200" cy="240" rx="30" ry="12" fill="#10b981" opacity="0.4" filter="blur(6px)" />
    

  <defs>
    <radialGradient id="bgGrad-cripta-mortal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
    </radialGradient>
  </defs>
</svg>
