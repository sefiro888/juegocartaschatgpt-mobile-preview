<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-nigromante-oscuro)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Skull-topped staff and caster silhouette -->
      <g transform="translate(130, 80)">
        <path d="M 30,130 L 110,130 L 120,230 L 20,230 Z" fill="#0f0219" stroke="#a855f7" stroke-width="2" />
        <path d="M 45,95 C 45,55 95,55 95,95 L 85,115 L 55,115 Z" fill="#2d064c" stroke="#d946ef" stroke-width="2" />
        <!-- Glowing green fire orb in hood -->
        <circle cx="70" cy="95" r="6" fill="#10b981" filter="blur(1px)" />
        <!-- Necromantic staff -->
        <line x1="-15" y1="70" x2="-15" y2="230" stroke="#3b0764" stroke-width="3" />
        <circle cx="-15" cy="60" r="12" fill="#10b981" opacity="0.8" filter="blur(4px)" />
        <!-- Small skull details on staff top -->
        <rect x="-21" y="55" width="12" height="10" rx="3" fill="#cbd5e1" />
      </g>
    

  <defs>
    <radialGradient id="bgGrad-nigromante-oscuro" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
    </radialGradient>
  </defs>
</svg>
