<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-zombi-hambriento)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Zombie torso silhouette reaching out -->
      <path d="M 130,250 L 270,250 L 250,330 L 150,330 Z" fill="#142417" stroke="#10b981" stroke-width="2" />
      <circle cx="200" cy="190" r="22" fill="#2d372e" stroke="#10b981" stroke-width="1.5" />
      <!-- Reaching hands -->
      <path d="M 140,250 L 90,210 M 260,250 L 310,210" stroke="#2d372e" stroke-width="6" stroke-linecap="round" />
      <path d="M 140,250 L 90,210 M 260,250 L 310,210" stroke="#10b981" stroke-width="2" stroke-linecap="round" />
      <!-- Glowing pale white eyes -->
      <circle cx="192" cy="190" r="2.5" fill="#fff" />
      <circle cx="208" cy="190" r="2.5" fill="#fff" />
    

  <defs>
    <radialGradient id="bgGrad-zombi-hambriento" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
