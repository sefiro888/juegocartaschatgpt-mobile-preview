<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#1c1c14" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-aguila-celestial)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Sky wings silhouette -->
      <path d="M 200,190 L 80,100 L 130,220 L 200,210 Z" fill="#451a03" stroke="#fbbf24" stroke-width="2" />
      <path d="M 200,190 L 320,100 L 270,220 L 200,210 Z" fill="#451a03" stroke="#fbbf24" stroke-width="2" />
      <!-- Eagle head details -->
      <circle cx="200" cy="170" r="16" fill="#eab308" stroke="#fbbf24" stroke-width="1.5" />
      <polygon points="190,170 175,178 190,180" fill="#fef9c3" />
      <!-- Radiant rays -->
      <line x1="200" y1="140" x2="200" y2="100" stroke="#fef9c3" stroke-width="2" />
      <line x1="160" y1="150" x2="130" y2="130" stroke="#fef9c3" stroke-width="2" />
      <line x1="240" y1="150" x2="270" y2="130" stroke="#fef9c3" stroke-width="2" />
    

  <defs>
    <radialGradient id="bgGrad-aguila-celestial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#1c1c14" />
    </radialGradient>
  </defs>
</svg>
