<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Cavern rock background -->
  <rect width="400" height="400" fill="#140b08" />
  <path d="M 0,0 L 400,0 L 400,400 L 0,400 Z" fill="url(#cave-glow)" opacity="0.35" />

  <!-- Cave walls -->
  <path d="M 0,0 C 80,50 60,180 30,400 L 0,400 Z" fill="#0b0503" />
  <path d="M 400,0 C 320,50 340,180 370,400 L 400,400 Z" fill="#0b0503" />

  <!-- Molten lava stream at bottom -->
  <rect x="30" y="320" width="340" height="80" fill="url(#forge-lava-grad)" />
  <path d="M 30,320 Q 200,340 370,320 M 30,340 Q 200,360 370,340" stroke="#ffcc00" stroke-width="2" fill="none" opacity="0.8" />

  <!-- The Anvil Stand -->
  <polygon points="120,330 140,240 260,240 280,330" fill="#180e0b" stroke="#ff4d00" stroke-width="2" />

  <!-- Glowing Anvil on top -->
  <g transform="translate(105, 170)">
    <!-- Base block of anvil -->
    <path d="M 30,70 L 160,70 L 150,50 L 40,50 Z" fill="#2d1c17" />
    
    <!-- Anvil Body -->
    <path d="M 50,50 C 50,30 65,30 65,10 L 125,10 C 125,30 140,30 140,50 Z" fill="#1c0f0b" />
    
    <!-- Anvil Top and Horns -->
    <!-- Left horn (curved/pointed) -->
    <path d="M 20,10 C 20,10 65,10 65,10 L 65,-10 L 45,-10 Q 15,-10 20,10 Z" fill="#2d1c17" stroke="#ff3c00" stroke-width="1.5" />
    <!-- Right flat horn -->
    <path d="M 125,10 L 175,10 L 175,-10 L 125,-10 Z" fill="#2d1c17" stroke="#ff3c00" stroke-width="1.5" />
    <!-- Anvil center glowing surface -->
    <rect x="65" y="-10" width="60" height="20" fill="#1c0f0b" stroke="#ff3c00" stroke-width="1.5" />
    <rect x="75" y="-7" width="40" height="14" fill="#ff7700" filter="blur(1px)" />
    <rect x="85" y="-4" width="20" height="8" fill="#ffea00" />
  </g>

  <!-- Sparks rising -->
  <circle cx="150" cy="130" r="2" fill="#ffea00" />
  <circle cx="180" cy="110" r="3" fill="#ff7700" />
  <circle cx="210" cy="140" r="1.5" fill="#ffea00" />
  <circle cx="230" cy="100" r="2.5" fill="#ff3c00" />
  <circle cx="250" cy="120" r="2" fill="#ff9900" />

  <defs>
    <radialGradient id="cave-glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ff4d00" />
      <stop offset="60%" stop-color="#541b0b" />
      <stop offset="100%" stop-color="#140b08" />
    </radialGradient>
    <linearGradient id="forge-lava-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3300" />
      <stop offset="100%" stop-color="#0b0503" />
    </linearGradient>
  </defs>
</svg>
