<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Cosmos background -->
  <rect width="400" height="400" fill="#030611" />
  <circle cx="250" cy="150" r="200" fill="url(#cosmos-glow)" opacity="0.4" />

  <!-- Stars in background -->
  <circle cx="50" cy="80" r="1" fill="#fff" />
  <circle cx="320" cy="70" r="1.5" fill="#a5b4fc" />
  <circle cx="100" cy="220" r="1.2" fill="#fff" />
  <circle cx="280" cy="310" r="2" fill="#a5b4fc" />
  <circle cx="150" cy="30" r="1.5" fill="#fff" />

  <!-- Comet trailing path (Diagonal from top-left to bottom-right) -->
  <g transform="translate(200, 200) rotate(45)">
    <!-- Arcane mana tail -->
    <path d="M 0,0 C -25,-60 -5,-220 -8,-280 C 8,-220 25,-60 0,0 Z" fill="url(#comet-tail-grad)" filter="blur(2px)" />
    <path d="M 0,-20 C -15,-60 -3,-180 -5,-230 C 5,-180 15,-60 0,-20 Z" fill="#e0f7fa" opacity="0.6" />

    <!-- Bright comet nucleus -->
    <circle cx="0" cy="10" r="22" fill="#00d9ff" filter="blur(4px)" opacity="0.9" />
    <circle cx="0" cy="10" r="14" fill="#ffffff" />
    
    <!-- Magic sparks flying off -->
    <circle cx="-15" cy="-80" r="3" fill="#00d9ff" />
    <circle cx="25" cy="-120" r="2" fill="#a5b4fc" />
    <circle cx="-35" cy="-180" r="2.5" fill="#00d9ff" />
    <circle cx="15" cy="-220" r="1.5" fill="#fff" />
  </g>

  <defs>
    <radialGradient id="cosmos-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="60%" stop-color="#0c0e29" />
      <stop offset="100%" stop-color="#030611" />
    </radialGradient>
    <linearGradient id="comet-tail-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>
