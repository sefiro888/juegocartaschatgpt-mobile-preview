<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Dark background -->
  <rect width="400" height="400" fill="#150a0a" />
  <circle cx="200" cy="200" r="160" fill="url(#spark-radial)" opacity="0.3" />
  
  <!-- Sparks -->
  <path d="M 200,200 L 150,150 M 200,200 L 250,150 M 200,200 L 150,250 M 200,200 L 250,250" stroke="#ff3e3e" stroke-width="4" stroke-linecap="round" />
  <path d="M 200,200 L 200,100 M 200,200 L 300,200 M 200,200 L 200,300 M 200,200 L 100,200" stroke="#ffaa00" stroke-width="5" stroke-linecap="round" />
  <path d="M 200,200 L 220,130 M 200,200 L 270,220 M 200,200 L 180,270 M 200,200 L 130,180" stroke="#ffea00" stroke-width="3" stroke-linecap="round" />

  <!-- Center glow -->
  <circle cx="200" cy="200" r="25" fill="#ffffff" filter="blur(3px)" />
  <circle cx="200" cy="200" r="10" fill="#ffea00" />

  <defs>
    <radialGradient id="spark-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3e3e" />
      <stop offset="100%" stop-color="#150a0a" />
    </radialGradient>
  </defs>
</svg>
