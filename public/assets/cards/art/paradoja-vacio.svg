<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0b0514" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-paradoja-vacio)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Impossible intersecting triangles -->
      <polygon points="200,60 120,240 280,240" fill="none" stroke="#ec4899" stroke-width="4" />
      <polygon points="200,280 120,100 280,100" fill="none" stroke="#8b5cf6" stroke-width="3" />
      <!-- Magic focal point -->
      <circle cx="200" cy="170" r="16" fill="#fae8ff" filter="blur(3px)" opacity="0.9" />
      <circle cx="200" cy="170" r="6" fill="#ffffff" />
    

  <defs>
    <radialGradient id="bgGrad-paradoja-vacio" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#0b0514" />
    </radialGradient>
  </defs>
</svg>
