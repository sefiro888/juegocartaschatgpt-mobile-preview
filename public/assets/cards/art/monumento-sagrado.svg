<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#1c1c14" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-monumento-sagrado)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Monument silhouette (obelisk) -->
      <polygon points="170,300 230,300 215,80 200,60 185,80" fill="#3f3f46" stroke="#fbbf24" stroke-width="3.5" />
      <!-- Base platform -->
      <rect x="130" y="300" width="140" height="25" rx="5" fill="#18181b" stroke="#eab308" stroke-width="2" />
      <!-- Golden aura rings -->
      <ellipse cx="200" cy="180" rx="60" ry="15" fill="none" stroke="#eab308" stroke-width="2" stroke-opacity="0.6" />
      <ellipse cx="200" cy="130" rx="45" ry="12" fill="none" stroke="#fef9c3" stroke-width="1.5" stroke-opacity="0.8" />
    

  <defs>
    <radialGradient id="bgGrad-monumento-sagrado" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#1c1c14" />
    </radialGradient>
  </defs>
</svg>
