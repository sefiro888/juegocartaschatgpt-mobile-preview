<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-pesadilla-mortal)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Skeletal horse outline leaping -->
      <path d="M 90,240 Q 140,210 180,210 L 210,160 L 245,150 L 235,175 Q 260,200 230,220 Q 200,230 185,270 L 155,270" fill="none" stroke="#d946ef" stroke-width="4.5" stroke-linecap="round" />
      <!-- Ghostly wings -->
      <path d="M 180,210 Q 120,110 150,140 Z" fill="#3b0764" stroke="#a855f7" stroke-width="1.5" />
      <!-- Glowing green fire mane -->
      <circle cx="210" cy="155" r="10" fill="#10b981" filter="blur(4px)" opacity="0.8" />
    

  <defs>
    <radialGradient id="bgGrad-pesadilla-mortal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
    </radialGradient>
  </defs>
</svg>
