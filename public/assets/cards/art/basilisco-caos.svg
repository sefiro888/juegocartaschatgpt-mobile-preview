<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#160808" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-basilisco-caos)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Reptilian slithering coil -->
      <path d="M 100,280 C 150,220 250,320 300,260 C 350,200 300,100 240,120 C 180,140 160,80 200,60" fill="none" stroke="#ef4444" stroke-width="12" stroke-linecap="round" />
      <path d="M 100,280 C 150,220 250,320 300,260 C 350,200 300,100 240,120 C 180,140 160,80 200,60" fill="none" stroke="#fef08a" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" />
      <!-- Crest/Spikes -->
      <polygon points="190,40 210,40 200,15" fill="#f59e0b" />
      <polygon points="230,100 250,110 235,90" fill="#f59e0b" />
      <!-- Glowing chaotic eyes -->
      <circle cx="190" cy="55" r="3" fill="#ffffff" />
      <circle cx="210" cy="55" r="3" fill="#ffffff" />
    

  <defs>
    <radialGradient id="bgGrad-basilisco-caos" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#160808" />
    </radialGradient>
  </defs>
</svg>
