<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#1b0505" />
  
  <g transform="translate(100, 100)">
    <!-- Exploding core -->
    <circle cx="100" cy="100" r="90" fill="none" stroke="#ff3e3e" stroke-width="3" stroke-dasharray="12 15" />
    <circle cx="100" cy="100" r="60" fill="none" stroke="#ff7700" stroke-width="2" />
    
    <!-- Red beams -->
    <line x1="100" y1="100" x2="100" y2="0" stroke="#ffffff" stroke-width="5" />
    <line x1="100" y1="100" x2="200" y2="100" stroke="#ffffff" stroke-width="5" />
    <line x1="100" y1="100" x2="100" y2="200" stroke="#ffffff" stroke-width="5" />
    <line x1="100" y1="100" x2="0" y2="100" stroke="#ffffff" stroke-width="5" />
  </g>
</svg>
