<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#160808" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-guerrero-igneo)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Volcano rock base -->
      <polygon points="100,240 300,240 200,80" fill="#290c0c" stroke="#ef4444" stroke-width="2" />
      <circle cx="200" cy="180" r="40" fill="#f59e0b" opacity="0.8" filter="blur(5px)" />
      <!-- Fiery warrior silhouette holding sword -->
      <g transform="translate(180, 100)">
        <path d="M 10,80 L 30,80 L 35,130 L 5,130 Z" fill="#4c0c0c" stroke="#ef4444" stroke-width="2" />
        <circle cx="20" cy="65" r="10" fill="#ef4444" />
        <!-- Flaming sword -->
        <path d="M 30,70 L 60,30 L 40,75 Z" fill="#fef08a" stroke="#f59e0b" stroke-width="2" />
      </g>
    

  <defs>
    <radialGradient id="bgGrad-guerrero-igneo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#160808" />
    </radialGradient>
  </defs>
</svg>
