<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#120c0a" />
  <circle cx="200" cy="200" r="160" fill="url(#ash-warrior-gr)" opacity="0.3" />
  
  <!-- Warrior silhouette -->
  <g transform="translate(130, 80)">
    <path d="M 40,110 L 100,110 L 120,220 L 20,220 Z" fill="#0d0806" stroke="#ff3e3e" stroke-width="2" />
    <polygon points="50,110 90,110 70,60" fill="#2d1a15" stroke="#ff3e3e" stroke-width="2" />
    <polygon points="60,60 80,60 70,30" fill="#ff7700" />
    <circle cx="62" cy="75" r="3" fill="#ffea00" />
    <circle cx="78" cy="75" r="3" fill="#ffea00" />
    <!-- Weapon -->
    <line x1="110" y1="130" x2="150" y2="70" stroke="#ffaa00" stroke-width="5" stroke-linecap="round" />
  </g>

  <defs>
    <radialGradient id="ash-warrior-gr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7700" />
      <stop offset="100%" stop-color="#120c0a" />
    </radialGradient>
  </defs>
</svg>
