<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#110505" />
  
  <g transform="translate(100, 70)">
    <!-- Legs -->
    <rect x="30" y="190" width="40" height="70" fill="#1b0808" stroke="#ff3e3e" stroke-width="2.5" />
    <rect x="110" y="190" width="40" height="70" fill="#1b0808" stroke="#ff3e3e" stroke-width="2.5" />

    <!-- Furnace torso -->
    <rect x="10" y="70" width="160" height="130" rx="10" fill="#2d100d" stroke="#ff3e3e" stroke-width="3.5" />
    
    <!-- Grate (glowing magma lines) -->
    <rect x="40" y="100" width="100" height="60" fill="#110505" />
    <line x1="60" y1="100" x2="60" y2="160" stroke="#ff7700" stroke-width="4" />
    <line x1="80" y1="100" x2="80" y2="160" stroke="#ff7700" stroke-width="4" />
    <line x1="100" y1="100" x2="100" y2="160" stroke="#ff7700" stroke-width="4" />
    <line x1="120" y1="100" x2="120" y2="160" stroke="#ff7700" stroke-width="4" />
  </g>
</svg>
