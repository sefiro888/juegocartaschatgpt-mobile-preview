<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#08120a" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-lobo-salvaje)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Forest moon -->
      <circle cx="280" cy="100" r="35" fill="#fef08a" opacity="0.85" />
      <circle cx="280" cy="100" r="45" fill="#fef08a" opacity="0.3" filter="blur(6px)" />
      <!-- Wolf profile howling -->
      <path d="M 80,320 C 120,280 140,240 150,210 Q 150,150 180,140 L 220,110 L 210,140 L 240,155 L 205,175 Q 170,185 160,250 C 150,300 130,320 80,320 Z" fill="#111827" stroke="#10b981" stroke-width="2" />
      <!-- Forest trees outlines -->
      <polygon points="50,320 70,250 90,320" fill="#064e3b" />
      <polygon points="80,320 105,220 130,320" fill="#064e3b" stroke="#10b981" stroke-width="1" />
    

  <defs>
