<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#160808" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-gigante-magma)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Magma background pool -->
      <rect x="50" y="240" width="300" height="120" rx="20" fill="#7f1d1d" stroke="#f59e0b" stroke-width="3" />
      <circle cx="200" cy="260" r="80" fill="#ef4444" opacity="0.3" filter="blur(15px)" />
      <!-- Giant hands and head emerging -->
      <path d="M 160,240 C 160,160 240,160 240,240 Z" fill="#1c0505" stroke="#ef4444" stroke-width="2.5" />
      <!-- Glowing magma eyes -->
      <ellipse cx="190" cy="205" rx="8" ry="3" fill="#fef08a" />
      <ellipse cx="210" cy="205" rx="8" ry="3" fill="#fef08a" />
      <path d="M 100,260 Q 130,220 140,280" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
      <path d="M 300,260 Q 270,220 260,280" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
    

  <defs>
    <radialGradient id="bgGrad-gigante-magma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#160808" />
    </radialGradient>
  </defs>
</svg>
