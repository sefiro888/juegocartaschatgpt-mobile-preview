<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#08120a" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-crecimiento-salvaje)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Sprouting seed and vines -->
      <path d="M 200,320 C 150,220 220,180 180,100" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round" />
      <path d="M 200,320 C 250,240 180,160 220,80" fill="none" stroke="#84cc16" stroke-width="6" stroke-linecap="round" />
      <!-- Leaves -->
      <path d="M 175,150 Q 150,130 165,160 Z" fill="#84cc16" stroke="#ecfccb" stroke-width="1.5" />
      <path d="M 215,180 Q 240,170 225,195 Z" fill="#10b981" stroke="#ecfccb" stroke-width="1.5" />
      <!-- Glowing top flower bulb -->
      <circle cx="180" cy="100" r="12" fill="#ecfccb" opacity="0.9" filter="blur(4px)" />
      <circle cx="220" cy="80" r="10" fill="#ecfccb" opacity="0.9" filter="blur(4px)" />
    

  <defs>
    <radialGradient id="bgGrad-crecimiento-salvaje" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#08120a" />
    </radialGradient>
  </defs>
</svg>
