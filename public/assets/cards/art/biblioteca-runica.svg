<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#060a16" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-biblioteca-runica)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Grand library archway -->
      <path d="M 80,330 V 160 C 80,80 320,80 320,160 V 330" fill="none" stroke="#3b82f6" stroke-width="5" />
      <path d="M 110,330 V 170 C 110,110 290,110 290,170 V 330" fill="none" stroke="#00e5ff" stroke-width="2" stroke-dasharray="10 5" />
      <!-- Glowing bookshelves outlines -->
      <line x1="120" y1="210" x2="280" y2="210" stroke="#1e293b" stroke-width="6" />
      <line x1="120" y1="270" x2="280" y2="270" stroke="#1e293b" stroke-width="6" />
      <!-- Floating glowing scroll/book -->
      <g transform="translate(170, 140)">
        <rect x="0" y="0" width="60" height="20" rx="3" fill="#ffffff" stroke="#00e5ff" stroke-width="2" filter="blur(1px)" />
        <line x1="10" y1="10" x2="50" y2="10" stroke="#3b82f6" stroke-width="1.5" />
      </g>
    

  <defs>
    <radialGradient id="bgGrad-biblioteca-runica" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#060a16" />
    </radialGradient>
  </defs>
</svg>
