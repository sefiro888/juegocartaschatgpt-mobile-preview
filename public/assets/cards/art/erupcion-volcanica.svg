<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#1b0808" />
  <circle cx="200" cy="200" r="180" fill="url(#erup-sky)" opacity="0.4" />

  <!-- Volcano mountain -->
  <polygon points="20,400 200,100 380,400" fill="#0d0404" />
  <polygon points="120,400 200,180 280,400" fill="#180706" />

  <!-- Giant explosion from peak -->
  <circle cx="200" cy="100" r="40" fill="#ff3c00" filter="blur(5px)" />
  <circle cx="200" cy="90" r="20" fill="#ffea00" />
  
  <path d="M 200,100 Q 140,-20 80,-40 Q 180,20 200,100 Z" fill="#ff7700" />
  <path d="M 200,100 Q 260,-20 320,-40 Q 220,20 200,100 Z" fill="#ff7700" />

  <defs>
    <radialGradient id="erup-sky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3e3e" />
      <stop offset="100%" stop-color="#1b0808" />
    </radialGradient>
  </defs>
</svg>
