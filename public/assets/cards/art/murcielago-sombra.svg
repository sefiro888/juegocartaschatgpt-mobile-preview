<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-murcielago-sombra)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Giant purple moon backdrop -->
      <circle cx="200" cy="160" r="85" fill="#3b0764" opacity="0.6" />
      <!-- Giant bat silhouette wings -->
      <path d="M 200,165 L 100,120 L 70,210 L 130,195 L 160,220 Z" fill="#0a0212" stroke="#a855f7" stroke-width="2" />
      <path d="M 200,165 L 300,120 L 330,210 L 270,195 L 240,220 Z" fill="#0a0212" stroke="#a855f7" stroke-width="2" />
      <!-- Bat ears and head -->
      <circle cx="200" cy="155" r="12" fill="#0a0212" stroke="#a855f7" stroke-width="1.5" />
      <polygon points="190,150 185,130 195,145" fill="#a855f7" />
      <polygon points="210,150 215,130 205,145" fill="#a855f7" />
    

  <defs>
    <radialGradient id="bgGrad-murcielago-sombra" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
    </radialGradient>
  </defs>
</svg>
