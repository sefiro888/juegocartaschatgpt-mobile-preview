<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#180404" />
  <circle cx="200" cy="200" r="160" fill="url(#fenix-gr)" opacity="0.4" />

  <!-- Phoenix shape -->
  <g transform="translate(80, 80)">
    <!-- Wings left and right -->
    <path d="M 120,120 Q 50,40 -20,20 Q 50,100 120,140 Z" fill="#e63c00" stroke="#ffea00" stroke-width="1.5" />
    <path d="M 120,120 Q 190,40 260,20 Q 190,100 120,140 Z" fill="#e63c00" stroke="#ffea00" stroke-width="1.5" />
    
    <!-- Body & Head -->
    <path d="M 100,100 L 140,100 L 120,180 Z" fill="#ff7700" />
    <circle cx="120" cy="85" r="12" fill="#ffea00" />
    <polygon points="120,70 120,50 125,65" fill="#ffea00" />
  </g>

  <defs>
    <radialGradient id="fenix-gr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#180404" />
    </radialGradient>
  </defs>
</svg>
