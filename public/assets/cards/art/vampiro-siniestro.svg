<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-vampiro-siniestro)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- High collar cape & noble body -->
      <path d="M 120,220 L 280,220 L 290,320 L 110,320 Z" fill="#0c0114" stroke="#a855f7" stroke-width="2" />
      <!-- Cape wings behind -->
      <path d="M 120,220 L 80,120 L 130,170 Z" fill="#3b0764" stroke="#d946ef" stroke-width="1.5" />
      <path d="M 280,220 L 320,120 L 270,170 Z" fill="#3b0764" stroke="#d946ef" stroke-width="1.5" />
      <!-- Head with red eyes -->
      <circle cx="200" cy="150" r="22" fill="#1a0428" stroke="#a855f7" stroke-width="2" />
      <circle cx="190" cy="150" r="3" fill="#ef4444" />
      <circle cx="210" cy="150" r="3" fill="#ef4444" />
      <!-- Red moon background -->
      <circle cx="200" cy="150" r="110" fill="none" stroke="#ef4444" stroke-width="0.75" stroke-opacity="0.3" />
    

  <defs>
    <radialGradient id="bgGrad-vampiro-siniestro" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
    </radialGradient>
  </defs>
</svg>
