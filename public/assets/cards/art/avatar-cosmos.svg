<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#03050c" />
  <circle cx="200" cy="200" r="160" fill="url(#cosmic-avatar-radial)" opacity="0.5" />

  <!-- Avatar body/head -->
  <g transform="translate(130, 80)">
    <!-- Starry galaxy chest -->
    <path d="M 30,120 L 110,120 L 125,230 L 15,230 Z" fill="#0a0a24" stroke="#8b5cf6" stroke-width="2.5" />
    <circle cx="70" cy="170" r="2" fill="#fff" />
    <circle cx="50" cy="190" r="1" fill="#fff" />
    <circle cx="90" cy="180" r="1.5" fill="#00d9ff" />
    
    <!-- Levitating head -->
    <path d="M 45,90 C 45,50 95,50 95,90 L 85,105 L 55,105 Z" fill="#140b2e" stroke="#00e5ff" stroke-width="2" />
    <!-- Glowing face slit -->
    <polygon points="65,95 85,95 75,105" fill="#ffffff" />
  </g>

  <defs>
    <radialGradient id="cosmic-avatar-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="60%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#03050c" />
    </radialGradient>
  </defs>
</svg>
