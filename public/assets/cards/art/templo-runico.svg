<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Sky background -->
  <rect width="400" height="400" fill="#040712" />
  <circle cx="200" cy="200" r="160" fill="url(#temple-sky)" opacity="0.3" />

  <!-- Temple structure -->
  <g transform="translate(80, 100)">
    <!-- Base steps -->
    <rect x="0" y="160" width="240" height="60" fill="#141a29" stroke="#00d9ff" stroke-width="2" />
    <rect x="20" y="120" width="200" height="40" fill="#20293d" stroke="#00d9ff" stroke-width="2" />

    <!-- Pillars -->
    <rect x="40" y="40" width="24" height="80" fill="#141a29" stroke="#00e5ff" stroke-width="1.5" />
    <rect x="176" y="40" width="24" height="80" fill="#141a29" stroke="#00e5ff" stroke-width="1.5" />
    <rect x="108" y="40" width="24" height="80" fill="#141a29" stroke="#00e5ff" stroke-width="1.5" />

    <!-- Triangle Roof -->
    <polygon points="0,40 120,0 240,40" fill="#20293d" stroke="#00d9ff" stroke-width="2.5" />
    
    <!-- Glowing rune in center of roof -->
    <circle cx="120" cy="25" r="8" fill="#ffffff" filter="blur(1px)" />
    <circle cx="120" cy="25" r="4" fill="#00e5ff" />
  </g>

  <defs>
    <radialGradient id="temple-sky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#040712" />
    </radialGradient>
  </defs>
</svg>
