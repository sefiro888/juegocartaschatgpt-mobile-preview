<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0f0714" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-renegado-oscuro)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Hooded rogue profile in shadow -->
      <g transform="translate(130, 80)">
        <path d="M 30,120 L 110,120 L 120,225 L 20,225 Z" fill="#07020d" stroke="#a855f7" stroke-width="2" />
        <path d="M 40,90 C 40,50 100,50 100,90 L 80,105 L 60,105 Z" fill="#180424" stroke="#d946ef" stroke-width="1.5" />
        <!-- Dual daggers glowing violet -->
        <path d="M 20,140 L 0,170 L 15,150 Z" fill="#f3e8ff" stroke="#d946ef" stroke-width="1.5" />
        <path d="M 100,140 L 120,170 L 105,150 Z" fill="#f3e8ff" stroke="#d946ef" stroke-width="1.5" />
      </g>
    

  <defs>
    <radialGradient id="bgGrad-renegado-oscuro" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#0f0714" />
    </radialGradient>
  </defs>
</svg>
