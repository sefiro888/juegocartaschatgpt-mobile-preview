<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#040913" />
  
  <g transform="translate(110, 80)">
    <!-- Wings folded -->
    <path d="M 10,120 Q 50,60 80,100 L 90,190 Z" fill="#0d1b33" stroke="#00e5ff" stroke-width="1.5" />
    <path d="M 170,120 Q 130,60 100,100 L 90,190 Z" fill="#0d1b33" stroke="#00e5ff" stroke-width="1.5" />
    
    <!-- Owl Head -->
    <path d="M 30,80 Q 90,50 150,80 L 120,130 L 60,130 Z" fill="#14284d" stroke="#00e5ff" stroke-width="2.5" />
    <!-- Big glowing eyes -->
    <circle cx="65" cy="100" r="16" fill="#00e5ff" />
    <circle cx="65" cy="100" r="6" fill="#ffffff" />
    
    <circle cx="115" cy="100" r="16" fill="#00e5ff" />
    <circle cx="115" cy="100" r="6" fill="#ffffff" />

    <!-- Pointy beak -->
    <polygon points="90,110 100,110 95,125" fill="#ffffff" />
  </g>
</svg>
