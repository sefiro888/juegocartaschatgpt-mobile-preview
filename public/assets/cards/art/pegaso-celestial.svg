<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#1c1c14" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-pegaso-celestial)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Winged horse silhouette leaping -->
      <!-- Wing -->
      <path d="M 190,140 Q 110,60 130,130 Q 180,140 190,140" fill="#fef9c3" stroke="#fbbf24" stroke-width="2" />
      <!-- Horse body -->
      <path d="M 110,190 Q 160,170 190,140 L 220,130 Q 240,110 230,135 L 220,155 Q 240,180 200,195 L 180,240 L 165,240 L 175,195 Q 130,210 110,190" fill="#451a03" stroke="#eab308" stroke-width="2.5" />
      <!-- Star sparks -->
      <circle cx="90" cy="120" r="3" fill="#fff"/>
      <circle cx="290" cy="200" r="3.5" fill="#fff"/>
    

  <defs>
    <radialGradient id="bgGrad-pegaso-celestial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#1c1c14" />
    </radialGradient>
  </defs>
</svg>
