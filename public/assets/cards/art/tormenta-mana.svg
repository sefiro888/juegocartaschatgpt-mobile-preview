<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#040915" />
  
  <!-- Swirling snow storm paths -->
  <path d="M 50,0 Q 200,100 200,200 Q 200,300 350,400" fill="none" stroke="#00e5ff" stroke-width="20" stroke-linecap="round" opacity="0.25" filter="blur(8px)" />
  <path d="M 350,0 Q 200,100 200,200 Q 200,300 50,400" fill="none" stroke="#a5b4fc" stroke-width="10" stroke-linecap="round" opacity="0.4" filter="blur(3px)" />

  <!-- Snow particles -->
  <circle cx="120" cy="80" r="3" fill="#ffffff" />
  <circle cx="280" cy="140" r="2" fill="#00e5ff" />
  <circle cx="160" cy="280" r="4" fill="#ffffff" />
  <circle cx="240" cy="340" r="1.5" fill="#00e5ff" />
</svg>
