<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Smoky background -->
  <rect width="400" height="400" fill="#140f0d" />
  <circle cx="200" cy="200" r="180" fill="url(#smoke-grad)" opacity="0.3" />

  <!-- Fire pillars left and right -->
  <path d="M 0,400 Q 40,280 20,150 Q 5,100 0,80 Z" fill="#b32400" opacity="0.4" filter="blur(6px)" />
  <path d="M 400,400 Q 360,280 380,150 Q 395,100 400,80 Z" fill="#ff4d00" opacity="0.3" filter="blur(8px)" />

  <!-- Ground -->
  <polygon points="0,400 0,330 200,350 400,320 400,400" fill="#080605" />

  <!-- Berserker Helmet / Axes Silhouette in center -->
  <g transform="translate(100, 80)">
    <!-- Axes Crossed behind helmet -->
    <line x1="-20" y1="220" x2="220" y2="-20" stroke="#0a0707" stroke-width="15" stroke-linecap="round" />
    <line x1="-20" y1="220" x2="220" y2="-20" stroke="#e63c00" stroke-width="4" stroke-linecap="round" filter="blur(1px)" />
    
    <line x1="220" y1="220" x2="-20" y2="-20" stroke="#0a0707" stroke-width="15" stroke-linecap="round" />
    <line x1="220" y1="220" x2="-20" y2="-20" stroke="#e63c00" stroke-width="4" stroke-linecap="round" filter="blur(1px)" />

    <!-- Axe blades (left) -->
    <path d="M 10,25 C -15,10 -30,-20 -15,-30 C -5,-40 30,10 10,25 Z" fill="#2d120d" stroke="#ff3c00" stroke-width="2" />
    <!-- Axe blades (right) -->
    <path d="M 190,25 C 215,10 230,-20 215,-30 C 205,-40 170,10 190,25 Z" fill="#2d120d" stroke="#ff3c00" stroke-width="2" />

    <!-- Spiked Helmet -->
    <path d="M 50,150 C 50,70 150,70 150,150 L 140,165 L 60,165 Z" fill="#0f0b0a" stroke="#ff3c00" stroke-width="3" />
    <polygon points="100,60 90,20 110,20" fill="#e63c00" />
    <polygon points="65,90 40,65 55,85" fill="#e63c00" />
    <polygon points="135,90 160,65 145,85" fill="#e63c00" />

    <!-- Glowing eyes inside helmet -->
    <circle cx="82" cy="115" r="5" fill="#ffea00" />
    <circle cx="118" cy="115" r="5" fill="#ffea00" />
    <path d="M 75,110 L 90,113 M 125,110 L 110,113" stroke="#ff3c00" stroke-width="3" />
  </g>

  <!-- Magma splash at the base -->
  <ellipse cx="200" cy="350" rx="90" ry="12" fill="#ff3c00" filter="blur(4px)" opacity="0.6" />
  
  <defs>
    <radialGradient id="smoke-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4400" />
      <stop offset="80%" stop-color="#2a0d08" />
      <stop offset="100%" stop-color="#140f0d" />
    </radialGradient>
  </defs>
</svg>
