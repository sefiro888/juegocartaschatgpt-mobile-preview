<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Cold winter night sky background -->
  <rect width="400" height="400" fill="#050e18" />
  <circle cx="200" cy="200" r="170" fill="url(#frost-radial)" opacity="0.4" />

  <!-- Snow pine silhouettes -->
  <polygon points="20,400 40,280 60,400" fill="#03080e" />
  <polygon points="10,400 30,300 50,400" fill="#040b14" opacity="0.7" />
  <polygon points="350,400 370,260 390,400" fill="#03080e" />

  <!-- Snow floor -->
  <path d="M 0,350 Q 200,320 400,350 L 400,400 L 0,400 Z" fill="#e2e8f0" />

  <!-- Floating Frost Swirl in center -->
  <g transform="translate(100, 80)">
    <!-- Glow behind spell -->
    <circle cx="100" cy="110" r="60" fill="#00e5ff" filter="blur(30px)" opacity="0.6" />

    <!-- Mage Hand Silhouette holding frost -->
    <path d="M 10,240 C 30,190 70,160 85,130 C 90,140 85,150 75,170 C 65,190 60,210 50,240 Z" fill="#0b1a29" stroke="#00e5ff" stroke-width="1.5" />
    
    <!-- Frost Swirl Spiral path -->
    <path d="M 100,110 A 30,30 0 1,0 130,140 A 60,60 0 1,0 70,50" fill="none" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" filter="blur(1px)" />
    <path d="M 100,110 A 20,20 0 1,0 120,130 A 40,40 0 1,0 80,70" fill="none" stroke="#e0f7fa" stroke-width="2" stroke-linecap="round" />

    <!-- Ice Crystal Stars -->
    <polygon points="100,75 103,90 115,90 105,95 108,110 100,100 92,110 95,95 85,90 97,90" fill="#ffffff" />
    <polygon points="150,140 152,148 160,148 154,152 156,160 150,154 144,160 146,152 140,148 148,148" fill="#ffffff" />
    
    <!-- Sparkles -->
    <circle cx="60" cy="120" r="3" fill="#00e5ff" />
    <circle cx="140" cy="80" r="2.5" fill="#ffffff" />
    <circle cx="90" cy="150" r="1.5" fill="#00e5ff" />
  </g>

  <defs>
    <radialGradient id="frost-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="70%" stop-color="#051c33" />
      <stop offset="100%" stop-color="#050e18" />
    </radialGradient>
  </defs>
</svg>
