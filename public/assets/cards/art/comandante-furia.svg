<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Deep volcanic cavern background -->
  <rect width="400" height="400" fill="#0f0504" />
  <circle cx="200" cy="180" r="160" fill="url(#fire-lord-glow)" opacity="0.45" />

  <!-- Obsidian spikes framing the sides -->
  <polygon points="0,400 40,250 80,400" fill="#080202" />
  <polygon points="400,400 360,250 320,400" fill="#080202" />

  <!-- Lava river -->
  <polygon points="100,400 200,320 300,400" fill="#d93600" />
  <polygon points="140,400 200,340 260,400" fill="#ff7700" />

  <!-- Fire Warlord Main Silhouette -->
  <g transform="translate(110, 60)">
    <!-- Spiked Obsidian armor (shoulders) -->
    <polygon points="10,170 -10,120 30,140" fill="#0d0403" stroke="#ff3c00" stroke-width="2" />
    <polygon points="170,170 190,120 150,140" fill="#0d0403" stroke="#ff3c00" stroke-width="2" />
    <path d="M 15,160 Q 90,190 165,160 L 140,210 L 40,210 Z" fill="#150807" stroke="#ff4d00" stroke-width="2" />

    <!-- Burning Fire Head -->
    <!-- Outer flame head shape -->
    <path d="M 50,120 C 50,70 60,30 90,10 C 120,30 130,70 130,120 C 130,150 110,155 90,155 C 70,155 50,150 50,120 Z" fill="url(#fire-head-grad)" filter="blur(1px)" />
    <!-- Inner hot core -->
    <path d="M 65,120 C 65,90 70,60 90,40 C 110,60 115,90 115,120 C 115,135 105,142 90,142 C 75,142 65,135 65,120 Z" fill="#ffea00" />

    <!-- Spiked Crown -->
    <polygon points="60,110 50,75 75,100" fill="#0d0403" stroke="#ff3c00" stroke-width="1.5" />
    <polygon points="90,105 90,60 100,95" fill="#0d0403" stroke="#ff8800" stroke-width="1.5" />
    <polygon points="120,110 130,75 105,100" fill="#0d0403" stroke="#ff3c00" stroke-width="1.5" />

    <!-- Evil glowing slit eyes -->
    <polygon points="75,115 88,118 82,122" fill="#ffffff" />
    <polygon points="105,115 92,118 98,122" fill="#ffffff" />
  </g>

  <!-- Large Broadsword of pure lava (held on right side) -->
  <g transform="translate(260, 100) rotate(15)">
    <!-- Sword blade -->
    <polygon points="10,0 20,-120 30,0 20,40" fill="#ff6600" stroke="#ffcc00" stroke-width="2" />
    <polygon points="14,-20 20,-115 26,-20" fill="#ffea00" />
    <!-- Crossguard -->
    <rect x="0" y="0" width="40" height="10" rx="3" fill="#0d0403" stroke="#ff3c00" stroke-width="1.5" />
    <!-- Hilt/Pommel -->
    <rect x="15" y="10" width="10" height="30" fill="#150807" />
    <circle cx="20" cy="45" r="8" fill="#ff3c00" />
  </g>

  <defs>
    <radialGradient id="fire-lord-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff3300" />
      <stop offset="60%" stop-color="#691208" />
      <stop offset="100%" stop-color="#0f0504" />
    </radialGradient>
    <linearGradient id="fire-head-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff1a00" />
      <stop offset="50%" stop-color="#ff7700" />
      <stop offset="100%" stop-color="#ffea00" />
    </linearGradient>
  </defs>
</svg>
