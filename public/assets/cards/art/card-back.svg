<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <!-- Deep blue/black premium background -->
  <rect width="400" height="600" rx="15" fill="#080c16" />
  <rect x="10" y="10" width="380" height="580" rx="12" fill="url(#bg-radial)" stroke="var(--bg-panel-border)" stroke-width="2" />

  <!-- Gold borders -->
  <rect x="25" y="25" width="350" height="550" rx="8" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.85" />
  <rect x="32" y="32" width="336" height="536" rx="6" fill="none" stroke="#d97706" stroke-width="1" opacity="0.6" />

  <!-- Corner ornaments (Gold triangles) -->
  <polygon points="25,45 45,25 25,25" fill="#fbbf24" />
  <polygon points="375,45 355,25 375,25" fill="#fbbf24" />
  <polygon points="25,555 45,575 25,575" fill="#fbbf24" />
  <polygon points="375,555 355,575 375,575" fill="#fbbf24" />

  <!-- Center magical sphere (The Nexus Core) -->
  <circle cx="200" cy="300" r="70" fill="none" stroke="#00d9ff" stroke-width="3" filter="blur(1px)" opacity="0.8" />
  <circle cx="200" cy="300" r="60" fill="none" stroke="#ff3e3e" stroke-width="2" opacity="0.8" />
  <circle cx="200" cy="300" r="45" fill="url(#core-glow)" />

  <!-- Central logo (Four pointed star) -->
  <polygon points="200,240 215,285 260,300 215,315 200,360 185,315 140,300 185,285" fill="#ffffff" />
  <circle cx="200" cy="300" r="8" fill="#fbbf24" />

  <!-- Runes details (Lines across) -->
  <line x1="200" y1="45" x2="200" y2="230" stroke="#00d9ff" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.6" />
  <line x1="200" y1="370" x2="200" y2="555" stroke="#00d9ff" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.6" />
  
  <line x1="45" y1="300" x2="130" y2="300" stroke="#ff3e3e" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.6" />
  <line x1="270" y1="300" x2="355" y2="300" stroke="#ff3e3e" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.6" />

  <defs>
    <radialGradient id="bg-radial" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#141c2e" />
      <stop offset="70%" stop-color="#0a0f1b" />
      <stop offset="100%" stop-color="#04060b" />
    </radialGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#00d9ff" />
      <stop offset="80%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#080c16" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>
