<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Stormy winter sky background -->
  <rect width="400" height="400" fill="#0c1322" />
  <circle cx="200" cy="200" r="170" fill="url(#storm-gr)" opacity="0.3" />

  <!-- Snow storm environment lines -->
  <line x1="20" y1="20" x2="380" y2="380" stroke="#ffffff" stroke-width="0.8" opacity="0.15" />
  <line x1="300" y1="20" x2="20" y2="300" stroke="#ffffff" stroke-width="0.5" opacity="0.1" />

  <!-- Snow ground -->
  <polygon points="0,330 180,310 280,340 400,290 400,400 0,400" fill="#e2e8f0" />

  <!-- Ice Giant Silhouette in center -->
  <g transform="translate(110, 60)">
    <!-- Legs -->
    <rect x="40" y="180" width="30" height="70" fill="#004d61" stroke="#00d9ff" stroke-width="2" />
    <rect x="110" y="180" width="30" height="70" fill="#004d61" stroke="#00d9ff" stroke-width="2" />

    <!-- Massive torso -->
    <path d="M 10,70 L 170,70 L 150,180 L 30,180 Z" fill="#006680" stroke="#00e5ff" stroke-width="3" />
    <polygon points="10,70 90,70 110,180 30,180" fill="#0099bf" opacity="0.6" />

    <!-- Shoulder spikes -->
    <polygon points="10,70 -20,40 20,60" fill="#00d9ff" />
    <polygon points="170,70 200,40 160,60" fill="#00d9ff" />

    <!-- Head -->
    <polygon points="70,70 110,70 120,30 60,30" fill="#0c1322" stroke="#00d9ff" stroke-width="2" />
    <circle cx="82" cy="50" r="4" fill="#ffffff" />
    <circle cx="98" cy="50" r="4" fill="#ffffff" />
  </g>

  <defs>
    <radialGradient id="storm-gr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#0c1322" />
    </radialGradient>
  </defs>
</svg>
