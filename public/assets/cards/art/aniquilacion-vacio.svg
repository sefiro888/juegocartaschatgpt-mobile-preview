<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#0b0514" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-aniquilacion-vacio)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Black hole core -->
      <circle cx="200" cy="160" r="35" fill="#000000" stroke="#ec4899" stroke-width="4.5" />
      <!-- Accretion disk -->
      <ellipse cx="200" cy="160" rx="110" ry="25" fill="none" stroke="url(#annihil-grad)" stroke-width="8" transform="rotate(-15, 200, 160)" />
      <!-- Swirling cosmic dust -->
      <path d="M 100,130 Q 200,210 300,190" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="8 6" />
      <path d="M 120,110 Q 200,250 280,210" fill="none" stroke="#8b5cf6" stroke-width="1" />
      <defs>
        <linearGradient id="annihil-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ec4899" />
          <stop offset="50%" stop-color="#8b5cf6" />
          <stop offset="100%" stop-color="#1e0b36" />
        </linearGradient>
      </defs>
    

  <defs>
    <radialGradient id="bgGrad-aniquilacion-vacio" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#0b0514" />
    </radialGradient>
  </defs>
</svg>
