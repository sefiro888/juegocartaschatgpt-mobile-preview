<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#140606" />
  
  <!-- Lava lines -->
  <path d="M 0,0 L 400,400 M 100,0 L 400,300 M 0,100 L 300,400" stroke="#ff3c00" stroke-width="2" opacity="0.3" />

  <!-- Drake head and neck -->
  <g transform="translate(100, 100)">
    <path d="M 40,80 L 120,60 L 160,110 L 110,130 L 60,140 Z" fill="#1b0807" stroke="#ff3e3e" stroke-width="2.5" />
    <polygon points="120,60 100,20 115,40" fill="#ff7700" />
    <polygon points="100,60 80,25 95,45" fill="#ffaa00" />
    <circle cx="118" cy="85" r="4" fill="#ffffff" />
    <circle cx="118" cy="85" r="1.5" fill="#ffcc00" />
    
    <!-- Fire glow in throat -->
    <path d="M 130,110 Q 150,115 140,125 Z" fill="#ffea00" />
  </g>
</svg>
