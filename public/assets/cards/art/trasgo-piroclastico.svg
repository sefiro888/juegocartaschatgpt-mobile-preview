<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#18110d" />
  
  <g transform="translate(120, 100)">
    <!-- Pointy ears & head -->
    <polygon points="10,60 -20,20 20,45" fill="#3b2519" stroke="#ff5500" stroke-width="1.5" />
    <polygon points="110,60 140,20 100,45" fill="#3b2519" stroke="#ff5500" stroke-width="1.5" />
    <path d="M 20,70 Q 60,40 100,70 L 80,110 L 40,110 Z" fill="#2d1a10" stroke="#ff5500" stroke-width="2" />
    <circle cx="45" cy="75" r="4" fill="#ffea00" />
    <circle cx="75" cy="75" r="4" fill="#ffea00" />

    <!-- Tiny body -->
    <path d="M 30,110 L 90,110 L 100,180 L 20,180 Z" fill="#1b0f0a" />

    <!-- Burning stick -->
    <line x1="80" y1="130" x2="130" y2="100" stroke="#ffea00" stroke-width="4" stroke-linecap="round" />
    <circle cx="130" cy="100" r="10" fill="#ff3c00" filter="blur(2px)" opacity="0.8" />
  </g>
</svg>
