<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#060913" />
  
  <g transform="translate(100, 80)">
    <!-- Swirling cloud body -->
    <path d="M 30,120 C 10,90 40,50 80,60 C 100,30 140,50 160,80 C 190,90 190,130 160,150 C 140,180 80,180 40,160 Z" fill="#14223d" stroke="#00e5ff" stroke-width="2" />
    <path d="M 50,110 C 60,95 80,95 90,110" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none" />
    
    <!-- Lightning bolts shooting downwards -->
    <polygon points="60,160 40,220 70,200 50,260 90,180 75,190" fill="#00e5ff" />
    <polygon points="140,160 120,220 150,200 130,260 170,180 155,190" fill="#ffffff" />
  </g>
</svg>
