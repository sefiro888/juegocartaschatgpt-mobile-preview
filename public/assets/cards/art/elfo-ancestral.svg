<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Multilayered Background -->
  <rect width="400" height="400" fill="#08120a" />
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad-elfo-ancestral)" opacity="0.3" />

  <!-- Inner artwork content -->
  
      <!-- Glowing green forest background circle -->
      <circle cx="200" cy="160" r="90" fill="#10b981" opacity="0.2" filter="blur(15px)" />
      <!-- Elven archer silhouette -->
      <g transform="translate(130, 80)">
        <path d="M 30,120 L 110,120 L 125,230 L 15,230 Z" fill="#042f1a" stroke="#10b981" stroke-width="2" />
        <path d="M 45,85 C 45,50 95,50 95,85 L 85,100 L 55,100 Z" fill="#064e3b" stroke="#84cc16" stroke-width="2" />
        <!-- Glowing green bow -->
        <path d="M 25,60 Q -15,140 25,220" fill="none" stroke="#a3e635" stroke-width="3.5" stroke-linecap="round" />
        <line x1="25" y1="65" x2="25" y2="215" stroke="#ecfccb" stroke-width="1" stroke-opacity="0.5" />
      </g>
    

  <defs>
    <radialGradient id="bgGrad-elfo-ancestral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#08120a" />
    </radialGradient>
  </defs>
</svg>
